name: Build and Push Docker Image

on:
  workflow_dispatch:

env:
  IMAGE_OWNER: szcq
  IMAGE_NAME: sharelatex
  IMAGE_VERSION: 6.2.0

jobs:
  build-amd64:
    name: Build amd64 image
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to DockerHub
      uses: docker/login-action@v4
      with:
        username: ${{ env.IMAGE_OWNER }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build and push amd64 image by digest
      id: build
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64
        push: true
        provenance: false
        build-args: |
          BASE_IMAGE=sharelatex/sharelatex:${{ env.IMAGE_VERSION }}
        outputs: type=image,name=${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

  build-arm64:
    name: Build arm64 image
    runs-on: ubuntu-24.04-arm

    permissions:
      contents: read

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to DockerHub
      uses: docker/login-action@v4
      with:
        username: ${{ env.IMAGE_OWNER }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build and push arm64 image by digest
      id: build
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/arm64
        push: true
        provenance: false
        build-args: |
          BASE_IMAGE=pibsas/sharelatex:${{ env.IMAGE_VERSION }}
        outputs: type=image,name=${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

  create-manifest:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    needs:
    - build-amd64
    - build-arm64

    permissions:
      contents: read

    steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to DockerHub
      uses: docker/login-action@v4
      with:
        username: ${{ env.IMAGE_OWNER }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Create multi-arch manifest
      run: |
        docker buildx imagetools create \
          -t ${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION }} \
          ${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}@${{ needs.build-amd64.outputs.digest }} \
          ${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}@${{ needs.build-arm64.outputs.digest }}

    - name: Inspect multi-arch manifest
      run: docker buildx imagetools inspect ${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION }}
